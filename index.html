<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroMap - Space Exploration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="space-canvas"></canvas>

    <div id="ui-container">
        <h1>Project AstroMap</h1>
        <p>상태: 항해 준비 완료</p>
        <button id="btn-explore">지구로 접근하기</button>
    </div>

    <div id="loading-screen" class="hidden">
        <div class="warp-effect"></div>
        <div class="dashboard-text">
            <h2>WARP DRIVE ACTIVE</h2>
            <p id="status-msg">지구 대기권 진입 및 데이터 동기화 중...</p>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
        </div>
    </div>

<div id="mission-ui" class="hidden">
    <div class="mission-panel">
        <h3>GROUND MISSION</h3>
        <p>러닝 동선 거리: <span id="distance-value">0</span> km</p>
        <button id="btn-reset">경로 초기화</button>
    </div>
</div>

<div id="nasa-modal" class="hidden">
    <div class="modal-content">
        <span id="close-modal">&times;</span>
        <h2 id="nasa-title">NASA News</h2>
        <img id="nasa-image" src="" alt="NASA APOD">
        <p id="nasa-description"></p>
    </div>
</div>

    <div id="map"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA_zt5pygWBhHI-Cqy6os7fMFSqAXfYels&libraries=geometry,drawing&callback=initMap" async defer></script>
    
    <script src="main.js"></script>
</body>
</html>
